services:
  - type: web
    name: zikky-manga-hub
    runtime: node
    repo: https://github.com/Zikkystar1/zikkymangahub
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 10000