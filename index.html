<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIKKY MANGA HUB - MangaDex API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --primary: #8b17b6;
        --primary-glow: rgba(139, 23, 182, 0.4);
        --secondary: #00ffea;
        --secondary-glow: rgba(0, 255, 234, 0.3);
        --accent: #ff2a6d;
        --accent-glow: rgba(255, 42, 109, 0.3);
        --text: #f0f0f0;
        --text-muted: #a0a0a0;
        --bg: #0a0a12;
        --card-bg: rgba(18, 18, 28, 0.95);
        --card-border: rgba(139, 23, 182, 0.3);
        --hover: rgba(139, 23, 182, 0.2);
        --border: rgba(139, 23, 182, 0.5);
        --success: #00ff88;
        --error: #ff2a6d;
        --neon: 0 0 15px var(--primary-glow);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-theme {
        --text: #1a1a2e;
        --text-muted: #4a4a6a;
        --bg: #f0f0f5;
        --card-bg: rgba(255, 255, 255, 0.95);
        --card-border: rgba(139, 23, 182, 0.2);
        --hover: rgba(139, 23, 182, 0.05);
        --border: rgba(139, 23, 182, 0.3);
        background: linear-gradient(135deg, #f5f5fa, #e8e8f0);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0a12, #1a0a2a, #0a122a);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        transition: var(--transition);
    }

    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            radial-gradient(circle at 20% 80%, var(--primary-glow), transparent 40%),
            radial-gradient(circle at 80% 20%, var(--secondary-glow), transparent 40%);
        z-index: -2;
        opacity: 0.3;
        animation: pulse 8s ease infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.5; }
    }

    /* Particles */
    .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
    }

    .particle {
        position: absolute;
        background: var(--primary);
        border-radius: 50%;
        opacity: 0.3;
        animation: float linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(100vh) translateX(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
    }

    /* Navbar */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border-bottom: 2px solid var(--primary);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 1000;
        box-shadow: var(--neon);
        animation: borderGlow 4s infinite;
    }

    @keyframes borderGlow {
        0%, 100% { border-bottom-color: var(--primary); }
        33% { border-bottom-color: var(--secondary); }
        66% { border-bottom-color: var(--accent); }
    }

    .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .brand-logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: white;
        animation: floatLogo 3s ease infinite;
    }

    @keyframes floatLogo {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }

    .brand-name {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .brand-highlight {
        background: linear-gradient(135deg, var(--secondary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-left: 5px;
    }

    .menu-toggle {
        display: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text);
        transition: var(--transition);
    }

    .menu-toggle:hover {
        color: var(--primary);
        transform: scale(1.1);
    }

    .nav-links {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        padding: 8px 15px;
        border-radius: 20px;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 8px;
        position: relative;
        overflow: hidden;
    }

    .nav-links a::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
        transition: left 0.5s ease;
    }

    .nav-links a:hover::before {
        left: 100%;
    }

    .nav-links a:hover, .nav-links a.active {
        color: var(--text);
        background: var(--hover);
        box-shadow: 0 0 15px var(--primary-glow);
    }

    .theme-toggle {
        background: var(--card-bg);
        border: 2px solid var(--primary);
        color: var(--text);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
    }

    .theme-toggle:hover {
        transform: rotate(180deg);
        box-shadow: var(--neon);
    }

    /* Main Container */
    .main-container {
        margin-top: 80px;
        padding: 20px;
        min-height: calc(100vh - 80px);
    }

    /* Hero Section */
    .hero-section {
        text-align: center;
        padding: 50px 20px;
        background: var(--card-bg);
        border-radius: 30px;
        margin-bottom: 30px;
        border: 2px solid var(--primary);
        box-shadow: var(--neon);
        position: relative;
        overflow: hidden;
    }

    .hero-section::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent 30%, var(--primary-glow) 50%, transparent 70%);
        animation: shine 8s infinite;
    }

    @keyframes shine {
        0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
        100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .hero-title {
        font-size: 3rem;
        margin-bottom: 20px;
    }

    .gradient-text {
        background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% 200%;
        animation: gradientShift 5s ease infinite;
    }

    @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    .hero-subtitle {
        color: var(--text-muted);
        font-size: 1.2rem;
        margin-bottom: 30px;
    }

    /* Search */
    .search-container {
        display: flex;
        max-width: 600px;
        margin: 0 auto 30px;
        gap: 10px;
    }

    .search-container input {
        flex: 1;
        padding: 15px 20px;
        border: 2px solid var(--border);
        border-radius: 30px;
        background: rgba(0, 0, 0, 0.3);
        color: var(--text);
        font-size: 1rem;
        transition: var(--transition);
    }

    .search-container input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 20px var(--primary-glow);
    }

    .search-container button {
        padding: 15px 30px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .search-container button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px var(--primary-glow);
    }

    /* Genre Filters */
    .genre-filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .filter-btn {
        padding: 10px 20px;
        border: 2px solid var(--border);
        border-radius: 25px;
        background: transparent;
        color: var(--text-muted);
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .filter-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
        transition: left 0.5s ease;
    }

    .filter-btn:hover::before {
        left: 100%;
    }

    .filter-btn:hover, .filter-btn.active {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        border-color: transparent;
        box-shadow: 0 0 15px var(--primary-glow);
    }

    /* Manga Grid */
    .manga-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 25px;
        padding: 20px;
    }

    .manga-card {
        background: var(--card-bg);
        border: 2px solid var(--card-border);
        border-radius: 15px;
        overflow: hidden;
        cursor: pointer;
        transition: var(--transition);
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .manga-card:hover {
        transform: translateY(-10px) scale(1.02);
        border-color: var(--primary);
        box-shadow: 0 10px 30px var(--primary-glow);
    }

    .manga-card img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        transition: var(--transition);
    }

    .manga-card:hover img {
        transform: scale(1.05);
    }

    .manga-info {
        padding: 15px;
        background: linear-gradient(to top, var(--card-bg), transparent);
    }

    .manga-title {
        font-weight: 600;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.95rem;
    }

    .manga-stats {
        display: flex;
        justify-content: space-between;
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .manga-stats i {
        margin-right: 3px;
    }

    .manga-stats .fa-star {
        color: #ffd700;
    }

    /* End Results */
    .end-results {
        text-align: center;
        padding: 40px 20px;
        margin: 20px 0;
        background: var(--card-bg);
        border: 2px solid var(--border);
        border-radius: 20px;
    }

    .end-results-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }

    .end-results-content i {
        font-size: 3rem;
        color: var(--success);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }

    /* Details Page */
    .details-page {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 2000;
        overflow-y: auto;
        padding: 80px 20px 40px;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .details-container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .back-button {
        background: var(--card-bg);
        border: 2px solid var(--primary);
        color: var(--text);
        padding: 12px 25px;
        border-radius: 30px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 30px;
        transition: var(--transition);
    }

    .back-button:hover {
        transform: translateX(-5px);
        box-shadow: var(--neon);
    }

    .manga-details-wrapper {
        background: var(--card-bg);
        border: 3px solid var(--primary);
        border-radius: 30px;
        padding: 40px;
        box-shadow: var(--neon);
    }

    .manga-details-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 40px;
        margin-bottom: 40px;
    }

    .details-cover {
        width: 100%;
        border-radius: 20px;
        border: 3px solid var(--border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .details-info h2 {
        font-size: 2.2rem;
        margin-bottom: 20px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .details-description {
        color: var(--text-muted);
        line-height: 1.8;
        margin-bottom: 25px;
        max-height: 200px;
        overflow-y: auto;
        padding-right: 10px;
    }

    .details-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        background: rgba(0,0,0,0.2);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 25px;
    }

    .stat-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .stat-label {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
    }

    .stat-label i {
        color: var(--primary);
        margin-right: 5px;
    }

    .stat-value {
        font-weight: 600;
    }

    .details-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 25px;
    }

    .tag {
        background: var(--hover);
        border: 1px solid var(--border);
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 0.85rem;
        transition: var(--transition);
    }

    .tag:hover {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
    }

    .action-buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        flex-wrap: wrap;
    }

    .action-btn {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .action-btn.primary {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
    }

    .action-btn.secondary {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--text);
    }

    .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px var(--primary-glow);
    }

    /* Chapters Section */
    .chapters-section {
        margin-top: 40px;
        border-top: 2px solid var(--border);
        padding-top: 30px;
    }

    .chapters-section h3 {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .chapter-list {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
    }

    .chapter-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: var(--transition);
    }

    .chapter-item:last-child {
        border-bottom: none;
    }

    .chapter-item:hover {
        background: var(--hover);
    }

    .chapter-info {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .chapter-number {
        font-weight: 600;
        color: var(--primary);
    }

    .chapter-pages {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .chapter-actions {
        display: flex;
        gap: 8px;
    }

    .chapter-action-btn {
        background: var(--hover);
        border: 1px solid var(--border);
        color: var(--text);
        width: 35px;
        height: 35px;
        border-radius: 5px;
        cursor: pointer;
        transition: var(--transition);
    }

    .chapter-action-btn:hover {
        background: var(--primary);
        color: white;
    }

    /* Reader Page */
    .reader-page {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 3000;
        overflow-y: auto;
    }

    .reader-header {
        position: sticky;
        top: 0;
        background: var(--card-bg);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        border-bottom: 2px solid var(--primary);
    }

    .reader-controls {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .reader-nav-btn {
        background: var(--hover);
        border: 1px solid var(--border);
        color: var(--text);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        transition: var(--transition);
    }

    .reader-nav-btn:hover {
        background: var(--primary);
    }

    .reader-body {
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .reader-body img {
        max-width: 100%;
        max-height: 95vh;
        border-radius: 10px;
    }

    /* Download Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 4000;
    }

    .modal-content {
        background: var(--card-bg);
        margin: 50px auto;
        max-width: 400px;
        border-radius: 20px;
        border: 2px solid var(--primary);
    }

    .modal-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-body {
        padding: 20px;
    }

    .quality-options {
        display: flex;
        gap: 20px;
        margin: 20px 0;
    }

    .quality-option {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }

    .download-progress {
        margin: 20px 0;
    }

    .progress-bar {
        height: 10px;
        background: rgba(255,255,255,0.1);
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 5px;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--success));
        width: 0%;
        transition: width 0.3s ease;
    }

    .download-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px var(--primary-glow);
    }

    /* Toast */
    .toast-container {
        position: fixed;
        top: 100px;
        right: 20px;
        z-index: 4000;
    }

    .toast {
        background: var(--card-bg);
        border: 2px solid var(--primary);
        border-radius: 10px;
        padding: 15px 20px;
        margin-bottom: 10px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
        animation: toastSlide 0.3s ease;
        box-shadow: var(--neon);
        max-width: 300px;
    }

    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--error); }

    @keyframes toastSlide {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    /* Refresh & Back to Top */
    .refresh-button, .back-to-top {
        position: fixed;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        z-index: 1000;
        box-shadow: var(--neon);
    }

    .refresh-button {
        bottom: 30px;
        left: 30px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        animation: pulseBtn 2s infinite;
    }

    .back-to-top {
        bottom: 30px;
        right: 30px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        display: none;
    }

    @keyframes pulseBtn {
        0%, 100% { box-shadow: 0 0 20px var(--primary-glow); }
        50% { box-shadow: 0 0 40px var(--primary-glow); }
    }

    .refresh-button:hover {
        transform: rotate(180deg) scale(1.1);
    }

    .back-to-top:hover {
        transform: translateY(-5px) scale(1.1);
    }

    .back-to-top.show {
        display: flex;
        animation: fadeIn 0.3s ease;
    }

    /* Loading */
    .loading {
        text-align: center;
        padding: 40px;
        display: none;
    }

    .loading i {
        font-size: 2rem;
        color: var(--primary);
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0); }
        100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .navbar { padding: 1rem; }
        .menu-toggle { display: block; }
        
        .nav-links {
            position: fixed;

    <script>
// MangaDex API Configuration
const MANGADEX_URL = 'https://api.mangadex.org';
const JIKAN_URL = 'https://api.jikan.moe/v4';
const CDN_URL = 'https://uploads.mangadex.org';

// Headers
const FETCH_HEADERS = {
    'User-Agent': 'ZIKKY-MANGA-HUB/1.0',
    'Accept': 'application/json'
};

// Genre IDs for MangaDex
const GENRE_IDS = {
    'action': '391b0423-d847-456f-aff0-8b0cfc03066b',
    'adventure': 'f4122d1c-3b44-44d0-9936-ff7502c39ad3',
    'comedy': '4d32cc48-9f00-4cca-9b5a-a839f0764984',
    'fantasy': 'cdc58593-87c6-4c3b-b4f6-b2c5c5f2e0d8',
    'horror': '0a39b5b1-b88e-4ec2-9d0c-f69aceaa7da9',
    'romance': '423e2eae-a7a2-4a8b-ac03-a8351462d71d'
};

// State Management
let currentOffset = 0;
let isLoading = false;
let hasMoreResults = true;
let currentQuery = '';
let currentGenre = 'all';
let selectedManga = null;
let currentChapters = [];
let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
let downloadedChapters = JSON.parse(localStorage.getItem('downloadedChapters')) || [];
let currentView = 'home';
let randomSeed = Date.now();
let mangaStatsCache = new Map(); // Cache for Jikan ratings

// DOM Elements
let mainContainer, detailsPage, readerPage, resultsContainer, loadingIndicator, endResults;
let searchInput, searchBtn, menuToggle, themeToggle, backToTop, refreshBtn, toastContainer;
let backFromDetails, backFromReader, prevChapterBtn, nextChapterBtn, downloadCurrentBtn;
let downloadOptionsModal, closeModalBtns, startDownloadBtn;
let homeBtn, popularBtn, bookmarksBtn, downloadsBtn;

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    initializeDOMElements();
    initializeApp();
});

function initializeDOMElements() {
    mainContainer = document.getElementById('mainContainer');
    detailsPage = document.getElementById('detailsPage');
    readerPage = document.getElementById('readerPage');
    resultsContainer = document.getElementById('results');
    loadingIndicator = document.getElementById('loading');
    endResults = document.getElementById('endResults');
    toastContainer = document.getElementById('toastContainer');
    searchInput = document.getElementById('searchInput');
    searchBtn = document.getElementById('searchBtn');
    menuToggle = document.getElementById('menuToggle');
    themeToggle = document.getElementById('themeToggle');
    backToTop = document.getElementById('backToTop');
    refreshBtn = document.getElementById('refreshBtn');
    backFromDetails = document.getElementById('backFromDetails');
    backFromReader = document.getElementById('backFromReader');
    prevChapterBtn = document.getElementById('prevChapterBtn');
    nextChapterBtn = document.getElementById('nextChapterBtn');
    downloadCurrentBtn = document.getElementById('downloadCurrentBtn');
    downloadOptionsModal = document.getElementById('downloadOptionsModal');
    closeModalBtns = document.querySelectorAll('.close-modal');
    startDownloadBtn = document.getElementById('startDownloadBtn');
    
    homeBtn = document.getElementById('homeBtn');
    popularBtn = document.getElementById('popularBtn');
    bookmarksBtn = document.getElementById('bookmarksBtn');
    downloadsBtn = document.getElementById('downloadsBtn');
    
    if (mainContainer) mainContainer.style.display = 'block';
}

function initializeApp() {
    createParticles();
    loadManga();
    setupEventListeners();
    
    // Theme setup
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        if (themeToggle) {
            themeToggle.querySelector('i').className = 'fas fa-sun';
        }
    }
}

function setupEventListeners() {
    // Search
    if (searchBtn) {
        searchBtn.addEventListener('click', performSearch);
    }
    
    if (searchInput) {
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    }
    
    // Genre filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGenre = btn.dataset.genre;
            resetSearch();
        });
    });
    
    // Navigation
    if (homeBtn) {
        homeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showHome();
        });
    }
    
    if (popularBtn) {
        popularBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showPopular();
        });
    }
    
    if (bookmarksBtn) {
        bookmarksBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showBookmarks();
        });
    }
    
    if (downloadsBtn) {
        downloadsBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showDownloads();
        });
    }
    
    // UI controls
    if (menuToggle) {
        menuToggle.addEventListener('click', toggleMenu);
    }
    
    if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
    }
    
    if (backToTop) {
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }
    
    if (refreshBtn) {
        refreshBtn.addEventListener('click', refreshRandom);
    }
    
    // Back buttons
    if (backFromDetails) {
        backFromDetails.addEventListener('click', () => {
            detailsPage.style.display = 'none';
            mainContainer.style.display = 'block';
            document.body.style.overflow = 'auto';
        });
    }
    
    if (backFromReader) {
        backFromReader.addEventListener('click', () => {
            readerPage.style.display = 'none';
            detailsPage.style.display = 'block';
            document.body.style.overflow = 'auto';
        });
    }
    
    // Chapter navigation
    if (prevChapterBtn) {
        prevChapterBtn.addEventListener('click', () => navigateChapter('prev'));
    }
    
    if (nextChapterBtn) {
        nextChapterBtn.addEventListener('click', () => navigateChapter('next'));
    }
    
    if (downloadCurrentBtn) {
        downloadCurrentBtn.addEventListener('click', () => {
            if (selectedChapter && selectedManga) {
                showDownloadOptions(selectedChapter.index);
            }
        });
    }
    
    // Modal
    closeModalBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (downloadOptionsModal) downloadOptionsModal.style.display = 'none';
        });
    });
    
    if (startDownloadBtn) {
        startDownloadBtn.addEventListener('click', startDownload);
    }
    
    // Scroll events
    window.addEventListener('scroll', handleScroll);
    
    window.addEventListener('click', (e) => {
        if (e.target === downloadOptionsModal) {
            downloadOptionsModal.style.display = 'none';
        }
    });
}

function createParticles() {
    const particles = document.getElementById('particles');
    if (!particles) return;
    
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = Math.random() * 3 + 'px';
        particle.style.height = particle.style.width;
        particle.style.animation = `float ${Math.random() * 10 + 10}s linear infinite`;
        particle.style.animationDelay = Math.random() * 5 + 's';
        particles.appendChild(particle);
    }
}

function toggleMenu() {
    const navLinks = document.getElementById('navLinks');
    if (navLinks) {
        navLinks.classList.toggle('active');
    }
}

function toggleTheme() {
    document.body.classList.toggle('light-theme');
    const icon = themeToggle ? themeToggle.querySelector('i') : null;
    if (icon) {
        if (document.body.classList.contains('light-theme')) {
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'light');
        } else {
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'dark');
        }
    }
}

// ============== NAVIGATION ==============

function showHome() {
    currentView = 'home';
    currentOffset = 0;
    hasMoreResults = true;
    currentQuery = '';
    currentGenre = 'all';
    
    // Update active nav
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    if (homeBtn) homeBtn.classList.add('active');
    
    // Reset genre filter
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('.filter-btn[data-genre="all"]');
    if (allBtn) allBtn.classList.add('active');
    
    // Clear results
    if (resultsContainer) resultsContainer.innerHTML = '';
    if (endResults) endResults.style.display = 'none';
    if (searchInput) searchInput.value = '';
    
    // New random seed
    randomSeed = Date.now();
    
    showToast('Loading manga...', 'info');
    loadManga();
}

function showPopular() {
    currentView = 'popular';
    currentOffset = 0;
    hasMoreResults = true;
    currentQuery = '';
    
    // Update active nav
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    if (popularBtn) popularBtn.classList.add('active');
    
    // Clear results
    if (resultsContainer) resultsContainer.innerHTML = '';
    if (endResults) endResults.style.display = 'none';
    
    loadPopularManga();
}

async function loadPopularManga() {
    if (isLoading || !hasMoreResults) return;
    
    isLoading = true;
    if (loadingIndicator) loadingIndicator.style.display = 'block';
    
    try {
        const limit = 30;
        const url = `${MANGADEX_URL}/manga?limit=${limit}&offset=${currentOffset}&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive&availableTranslatedLanguage[]=en&order[followedCount]=desc`;
        
        const response = await fetch(url, { headers: FETCH_HEADERS });
        if (!response.ok) throw new Error('API error');
        
        const data = await response.json();
        
        if (!data.data || data.data.length === 0) {
            hasMoreResults = false;
            if (endResults) endResults.style.display = 'block';
            return;
        }
        
        displayManga(data.data);
        
        currentOffset += limit;
        hasMoreResults = data.data.length === limit;
        
        if (!hasMoreResults && endResults) {
            endResults.style.display = 'block';
        }
        
    } catch (error) {
        console.error('Error loading popular:', error);
        showToast('Failed to load popular manga', 'error');
    } finally {
        isLoading = false;
        if (loadingIndicator) loadingIndicator.style.display = 'none';
    }
}

function showBookmarks() {
    currentView = 'bookmarks';
    
    // Update active nav
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    if (bookmarksBtn) bookmarksBtn.classList.add('active');
    
    // Clear results
    if (resultsContainer) {
        resultsContainer.innerHTML = '';
        
        if (bookmarks.length === 0) {
            resultsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-muted);">No bookmarks yet. Start adding some!</div>';
            if (endResults) endResults.style.display = 'none';
            return;
        }
        
        loadBookmarks();
    }
}

async function loadBookmarks() {
    showToast('Loading bookmarks...', 'info');
    
    for (const bookmark of bookmarks) {
        try {
            const response = await fetch(`${MANGADEX_URL}/manga/${bookmark.id}?includes[]=cover_art`, {
                headers: FETCH_HEADERS
            });
            
            if (!response.ok) continue;
            
            const data = await response.json();
            displaySingleManga(data.data);
            
        } catch (error) {
            console.error('Error loading bookmark:', error);
        }
    }
}

function showDownloads() {
    currentView = 'downloads';
    
    // Update active nav
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    if (downloadsBtn) downloadsBtn.classList.add('active');
    
    // Clear results
    if (resultsContainer) {
        resultsContainer.innerHTML = '';
        
        if (downloadedChapters.length === 0) {
            resultsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-muted);">No downloads yet. Download some chapters!</div>';
            if (endResults) endResults.style.display = 'none';
            return;
        }
        
        displayDownloads();
    }
}

function displayDownloads() {
    const downloadsByManga = {};
    
    downloadedChapters.forEach(download => {
        if (!downloadsByManga[download.mangaTitle]) {
            downloadsByManga[download.mangaTitle] = [];
        }
        downloadsByManga[download.mangaTitle].push(download);
    });
    
    Object.keys(downloadsByManga).forEach(mangaTitle => {
        const section = document.createElement('div');
        section.style.marginBottom = '30px';
        section.style.background = 'var(--card-bg)';
        section.style.borderRadius = '15px';
        section.style.padding = '20px';
        section.style.border = '2px solid var(--border)';
        
        section.innerHTML = `
            <h3 style="margin-bottom:15px; color:var(--primary);">${mangaTitle}</h3>
            <div style="display:grid; gap:10px;">
                ${downloadsByManga[mangaTitle].map(d => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:var(--hover); border-radius:8px;">
                        <span><i class="fas fa-file-pdf"></i> Chapter ${d.chapterNumber}</span>
                        <small>${new Date(d.downloadedAt).toLocaleDateString()} • ${d.pageCount || '?'} pages</small>
                    </div>
                `).join('')}
            </div>
        `;
        
        resultsContainer.appendChild(section);
    });
}

function performSearch() {
    if (!searchInput) return;
    
    const query = searchInput.value.trim();
    if (query === '') {
        showToast('Please enter a search term', 'info');
        return;
    }
    
    currentQuery = query;
    currentGenre = 'all';
    currentView = 'home';
    
    // Reset genre filter
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('.filter-btn[data-genre="all"]');
    if (allBtn) allBtn.classList.add('active');
    
    resetSearch();
    showToast(`Searching for "${query}"...`, 'info');
}

function resetSearch() {
    currentOffset = 0;
    hasMoreResults = true;
    
    if (resultsContainer) resultsContainer.innerHTML = '';
    if (endResults) endResults.style.display = 'none';
    
    loadManga();
}

function refreshRandom() {
    if (currentView !== 'home') {
        showHome();
        return;
    }
    
    // Reset everything
    currentOffset = 0;
    hasMoreResults = true;
    currentQuery = '';
    currentGenre = 'all';
    randomSeed = Date.now() + Math.random();
    
    // Reset UI
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('.filter-btn[data-genre="all"]');
    if (allBtn) allBtn.classList.add('active');
    
    if (searchInput) searchInput.value = '';
    
    // Clear results with animation
    if (resultsContainer) {
        resultsContainer.style.opacity = '0.5';
        setTimeout(() => {
            resultsContainer.innerHTML = '';
            resultsContainer.style.opacity = '1';
        }, 300);
    }
    
    if (endResults) endResults.style.display = 'none';
    
    showToast('Loading random manga...', 'info');
    loadManga();
    
    // Animate refresh button
    if (refreshBtn) {
        refreshBtn.style.transform = 'rotate(360deg)';
        setTimeout(() => {
            if (refreshBtn) refreshBtn.style.transform = '';
        }, 500);
    }
}

// ============== LOAD MANGA FROM MANGADEX ==============

async function loadManga() {
    if (isLoading || !hasMoreResults || currentView !== 'home') return;
    
    isLoading = true;
    if (loadingIndicator) loadingIndicator.style.display = 'block';
    
    try {
        const limit = 30;
        
        if (currentOffset + limit > 10000) {
            hasMoreResults = false;
            if (endResults) endResults.style.display = 'block';
            return;
        }
        
        // Build URL
        let url = `${MANGADEX_URL}/manga?limit=${limit}&offset=${currentOffset}&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive&availableTranslatedLanguage[]=en`;
        
        if (currentQuery) {
            url += `&title=${encodeURIComponent(currentQuery)}`;
        } else {
            // Add genre variety for homepage
            const genres = ['action', 'adventure', 'comedy', 'fantasy'];
            genres.forEach(g => {
                if (GENRE_IDS[g]) {
                    url += `&includedTags[]=${GENRE_IDS[g]}`;
                }
            });
            url += `&includedTagsMode=OR`;
            
            // Random sort for variety
            const sortOptions = ['followedCount', 'createdAt', 'updatedAt', 'rating'];
            const randomSort = sortOptions[Math.floor(Math.random() * sortOptions.length)];
            const randomDir = Math.random() > 0.5 ? 'desc' : 'asc';
            url += `&order[${randomSort}]=${randomDir}`;
        }
        
        // Add genre filter if selected
        if (currentGenre !== 'all' && GENRE_IDS[currentGenre]) {
            url += `&includedTags[]=${GENRE_IDS[currentGenre]}`;
        }
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(url, { 
            headers: FETCH_HEADERS,
            signal: controller.signal 
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error('API error');
        
        const data = await response.json();
        
        if (!data.data || data.data.length === 0) {
            hasMoreResults = false;
            if (endResults) endResults.style.display = 'block';
            return;
        }
        
        // Shuffle for randomness on homepage
        let mangaToDisplay = [...data.data];
        if (!currentQuery) {
            for (let i = mangaToDisplay.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mangaToDisplay[i], mangaToDisplay[j]] = [mangaToDisplay[j], mangaToDisplay[i]];
            }
        }
        
        displayManga(mangaToDisplay);
        
        currentOffset += limit;
        hasMoreResults = data.data.length === limit;
        
        if (!hasMoreResults && endResults) {
            endResults.style.display = 'block';
        }
        
    } catch (error) {
        if (error.name === 'AbortError') {
            showToast('Request timed out', 'error');
        } else {
            console.error('Error loading manga:', error);
            showToast('Failed to load manga', 'error');
        }
    } finally {
        isLoading = false;
        if (loadingIndicator) loadingIndicator.style.display = 'none';
    }
}

// ============== JIKAN API FOR RATINGS ==============

async function fetchJikanRatings(mangaList) {
    try {
        // Extract titles for searching
        const searchPromises = mangaList.map(async (manga) => {
            const title = manga.attributes.title.en || Object.values(manga.attributes.title)[0];
            if (!title) return null;
            
            // Clean title for search
            const cleanTitle = title.replace(/[^\w\s]/gi, '').substring(0, 50);
            
            try {
                // Search Jikan API
                const response = await fetch(`${JIKAN_URL}/manga?q=${encodeURIComponent(cleanTitle)}&limit=1&order_by=score&sort=desc`);
                
                if (!response.ok) return null;
                
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    const jikanManga = data.data[0];
                    return {
                        mangaId: manga.id,
                        score: jikanManga.score || null,
                        members: jikanManga.members || 0,
                        rank: jikanManga.rank || null
                    };
                }
            } catch (error) {
                console.error('Jikan search error:', error);
            }
            return null;
        });
        
        const results = await Promise.all(searchPromises);
        
        // Update cache and UI
        results.forEach(result => {
            if (result) {
                mangaStatsCache.set(result.mangaId, {
                    score: result.score,
                    members: result.members,
                    rank: result.rank
                });
            }
        });
        
        // Update UI with ratings
        updateRatingsInUI(mangaList);
        
    } catch (error) {
        console.error('Jikan API error:', error);
    }
}

function updateRatingsInUI(mangaList) {
    const cards = resultsContainer.children;
    const startIndex = cards.length - mangaList.length;
    
    mangaList.forEach((manga, index) => {
        const stats = mangaStatsCache.get(manga.id);
        if (!stats) return;
        
        const cardIndex = startIndex + index;
        if (cards[cardIndex]) {
            const ratingSpan = cards[cardIndex].querySelector('.rating-span .rating-value');
            if (ratingSpan) {
                const score = stats.score ? stats.score.toFixed(1) : 'N/A';
                ratingSpan.textContent = score;
            }
        }
    });
}

// ============== MANGA DETAILS ==============

async function openMangaDetails(mangaId, title) {
    selectedManga = { id: mangaId, title };
    
    try {
        showToast('Loading details...', 'info');
        
        // Fetch manga details
        const response = await fetch(`${MANGADEX_URL}/manga/${mangaId}?includes[]=cover_art&includes[]=author&includes[]=artist&includes[]=tag`, {
            headers: FETCH_HEADERS
        });
        
        if (!response.ok) throw new Error('Failed to fetch details');
        
        const data = await response.json();
        
        // Fetch chapters
        currentChapters = await fetchAllChapters(mangaId);
        
        // Get cached Jikan rating if available
        const jikanRating = mangaStatsCache.get(mangaId);
        
        // Hide main, show details
        mainContainer.style.display = 'none';
        detailsPage.style.display = 'block';
        document.body.style.overflow = 'auto';
        
        displayMangaDetails(data.data, jikanRating);
        
    } catch (error) {
        console.error('Error opening manga:', error);
        showToast('Failed to load details: ' + error.message, 'error');
    }
}

async function fetchAllChapters(mangaId) {
    let chapters = [];
    let offset = 0;
    const limit = 100;
    let hasMore = true;
    
    try {
        while (hasMore) {
            const response = await fetch(
                `${MANGADEX_URL}/chapter?manga=${mangaId}&translatedLanguage[]=en&limit=${limit}&offset=${offset}&order[chapter]=asc&contentRating[]=safe&contentRating[]=suggestive`,
                { headers: FETCH_HEADERS }
            );
            
            if (!response.ok) break;
            
            const data = await response.json();
            
            if (data.data.length === 0) {
                hasMore = false;
                break;
            }
            
            // Filter chapters with pages
            const validChapters = data.data.filter(ch => ch.attributes.pages > 0);
            chapters = [...chapters, ...validChapters];
            offset += limit;
            
            if (data.total && offset >= data.total) {
                hasMore = false;
            }
        }
        
        // Sort chapters
        chapters.sort((a, b) => {
            const numA = parseFloat(a.attributes.chapter) || 999999;
            const numB = parseFloat(b.attributes.chapter) || 999999;
            return numA - numB;
        });
        
    } catch (error) {
        console.error('Error fetching chapters:', error);
    }
    
    return chapters;
}

    const artist = manga.relationships.find(r => r.type === 'artist')?.attributes?.name || 'Unknown';

    let rank = 'N/A';

        rating = jikanRating.score ? jikanRating.score.toFixed(1) : 'N/A';

    }

        <div class="manga-details-grid">
            <img src="${coverUrl}" alt="${title}" class="details-cover" onerror="this.src='https://via.placeholder.com/300x400'">
            <div class="details-info">
                <h2>${title}</h2>
                
                <div style="background:rgba(0,0,0,0.2); border-radius:15px; padding:20px; margin-bottom:20px;">
                    <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:10px;">
                        <div><i class="fas fa-star" style="color:#ffd700;"></i> <strong>Score:</strong> ${rating}</div>
                        <div><i class="fas fa-users"></i> <strong>Members:</strong> ${members.toLocaleString()}</div>
                        <div><i class="fas fa-trophy"></i> <strong>Rank:</strong> #${rank}</div>
                    </div>
                </div>
                
                <p class="details-description">${description}</p>
                
                <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; background:rgba(0,0,0,0.2); border-radius:15px; padding:20px; margin:20px 0;">
                    <div><i class="fas fa-book"></i> <strong>Chapters:</strong> ${currentChapters.length}</div>
                    <div><i class="fas fa-calendar"></i> <strong>Year:</strong> ${year}</div>
                    <div><i class="fas fa-user"></i> <strong>Author:</strong> ${author}</div>
                    <div><i class="fas fa-paint-brush"></i> <strong>Artist:</strong> ${artist}</div>
                    <div><i class="fas fa-globe"></i> <strong>Status:</strong> ${status}</div>
                </div>
                
                <div class="details-tags">
                    ${manga.attributes.tags.map(tag => 
                        `<span class="tag">${tag.attributes.name.en}</span>`
                    ).join('')}
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn primary" id="readFirstBtn">
                        <i class="fas fa-book-open"></i> Read First Chapter
                    </button>
                    <button class="action-btn secondary" id="bookmarkBtn">
                        <i class="${bookmarks.some(b => b.id === manga.id) ? 'fas' : 'far'} fa-bookmark"></i>
                        ${bookmarks.some(b => b.id === manga.id) ? 'Bookmarked' : 'Bookmark'}
                    </button>
                </div>
            </div>
        </div>
        
        <div class="chapters-section">
            <h3><i class="fas fa-list"></i> Chapters (${currentChapters.length})</h3>
            <div class="chapter-list" id="chapterList">
                ${currentChapters.length > 0 ? 
                    currentChapters.map((ch, index) => {
                        const chapterNum = ch.attributes.chapter || index + 1;
                        const chapterTitle = ch.attributes.title || '';
                        const pages = ch.attributes.pages || 0;
                        return `
                            <div class="chapter-item" data-index="${index}">
                                <div class="chapter-info">
                                    <span class="chapter-number">Chapter ${chapterNum}</span>
                                    ${chapterTitle ? `<span style="color:var(--text-muted);">${chapterTitle}</span>` : ''}
                                    <span class="chapter-pages"><i class="far fa-file-image"></i> ${pages}</span>
                                </div>
                                <div class="chapter-actions">
                                    <button class="chapter-action-btn read-chapter" data-index="${index}" title="Read">
                                        <i class="fas fa-book-open"></i>
                                    </button>
                                    <button class="chapter-action-btn download-chapter" data-index="${index}" title="Download">
                                        <i class="fas fa-download"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('') 
                    : '<div style="text-align:center; padding:40px;">No chapters available</div>'
                }
            </div>
        </div>
    `;
    
    // Add event listeners
    document.querySelectorAll('.read-chapter').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const index = btn.dataset.index;
            openChapterReader(parseInt(index));
        });
    });
    
    document.querySelectorAll('.download-chapter').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const index = btn.dataset.index;
            showDownloadOptions(parseInt(index));
        });
    });
    
    document.querySelectorAll('.chapter-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (!e.target.closest('.chapter-actions')) {
                const index = item.dataset.index;
                openChapterReader(parseInt(index));
            }
        });
    });
    
    const readFirstBtn = document.getElementById('readFirstBtn');
    if (readFirstBtn) {
        readFirstBtn.addEventListener('click', () => {
            if (currentChapters.length > 0) {
                openChapterReader(0);
            } else {
                showToast('No chapters available', 'info');
            }
        });
    }
    
    const bookmarkBtn = document.getElementById('bookmarkBtn');
    if (bookmarkBtn) {
        bookmarkBtn.addEventListener('click', toggleBookmark);
    }
}

function toggleBookmark() {
    if (!selectedManga) return;
    
    const index = bookmarks.findIndex(b => b.id === selectedManga.id);
    
    if (index === -1) {
        bookmarks.push({
            id: selectedManga.id,
            title: selectedManga.title,
            addedAt: new Date().toISOString()
        });
        showToast('Bookmarked!', 'success');
    } else {
        bookmarks.splice(index, 1);
        showToast('Removed from bookmarks', 'info');
    }
    
    localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
    
    // Update button
    const bookmarkBtn = document.getElementById('bookmarkBtn');
    if (bookmarkBtn) {
        const isBookmarked = bookmarks.some(b => b.id === selectedManga.id);
        bookmarkBtn.innerHTML = `<i class="${isBookmarked ? 'fas' : 'far'} fa-bookmark"></i> ${isBookmarked ? 'Bookmarked' : 'Bookmark'}`;
    }
}

// ============== READER ==============

let selectedChapter = null;

async function openChapterReader(index) {
    if (index < 0 || index >= currentChapters.length) return;
    
    selectedChapter = {
        index,
        id: currentChapters[index].id,
        number: currentChapters[index].attributes.chapter || (index + 1),
        mangaTitle: selectedManga.title
    };
    
    try {
        showToast('Loading chapter...', 'info');
        
        const response = await fetch(`${MANGADEX_URL}/at-home/server/${selectedChapter.id}`, {
            headers: FETCH_HEADERS
        });
        
        if (!response.ok) throw new Error('Failed to load chapter');
        
        const data = await response.json();
        
        const pages = data.chapter.data.map(page => 
            `${data.baseUrl}/data/${data.chapter.hash}/${page}`
        );
        
        detailsPage.style.display = 'none';
        readerPage.style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        displayReader(pages);
        
    } catch (error) {
        console.error('Error loading chapter:', error);
        showToast('Failed to load chapter: ' + error.message, 'error');
    }
}

function displayReader(pages) {
    const readerBody = document.getElementById('readerBody');
    const readerTitle = document.getElementById('readerTitle');
    const chapterIndicator = document.getElementById('chapterIndicator');
    
    if (readerTitle) {
        readerTitle.textContent = selectedManga.title;
    }
    
    if (chapterIndicator) {
        chapterIndicator.textContent = `Chapter ${selectedChapter.number}/${currentChapters.length}`;
    }
    
    if (readerBody) {
        readerBody.innerHTML = pages.map(page => 
            `<img src="${page}" alt="Page" loading="lazy" onerror="this.src='https://via.placeholder.com/800x1200?text=Error+Loading+Page'">`
        ).join('');
    }
    
    const readerContainer = document.querySelector('.reader-container');
    if (readerContainer) readerContainer.scrollTop = 0;
}

function navigateChapter(direction) {
    if (!selectedChapter || !currentChapters.length) return;
    
    let newIndex = selectedChapter.index;
    
    if (direction === 'prev' && newIndex > 0) {
        newIndex--;
    } else if (direction === 'next' && newIndex < currentChapters.length - 1) {
        newIndex++;
    } else {
        showToast(direction === 'prev' ? 'First chapter' : 'Last chapter', 'info');
        return;
    }
    
    openChapterReader(newIndex);
}

// ============== DOWNLOAD ==============

function showDownloadOptions(index) {
    if (!selectedManga || !currentChapters[index]) return;
    
    selectedChapter = {
        index,
        id: currentChapters[index].id,
        number: currentChapters[index].attributes.chapter || (index + 1),
        mangaTitle: selectedManga.title,
        pages: currentChapters[index].attributes.pages || 0
    };
    
    const info = document.getElementById('downloadChapterInfo');
    if (info) {
        info.innerHTML = `
            <h4 style="color:var(--primary);">Chapter ${selectedChapter.number}</h4>
            <p>${selectedManga.title}</p>
            <small>Pages: ${selectedChapter.pages}</small>
        `;
    }
    
    // Reset progress
    const progress = document.getElementById('downloadProgress');
    if (progress) progress.style.display = 'none';
    
    downloadOptionsModal.style.display = 'block';
}

async function startDownload() {
    const quality = document.querySelector('input[name="quality"]:checked')?.value || 'data';
    
    downloadOptionsModal.style.display = 'none';
    
    try {
        showToast('Preparing download...', 'info');
        
        const progress = document.getElementById('downloadProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        
        if (progress) progress.style.display = 'block';
        if (progressFill) progressFill.style.width = '0%';
        if (progressText) progressText.textContent = '0%';
        
        const response = await fetch(`${MANGADEX_URL}/at-home/server/${selectedChapter.id}`, {
            headers: FETCH_HEADERS
        });
        
        if (!response.ok) throw new Error('Failed to fetch chapter');
        
        const data = await response.json();
        
        const pageFilenames = data.chapter[quality];
        const baseUrl = data.baseUrl;
        const chapterHash = data.chapter.hash;
        
        if (!pageFilenames || pageFilenames.length === 0) {
            throw new Error('No pages found');
        }
        
        await createChapterZip(baseUrl, chapterHash, pageFilenames, quality, progressFill, progressText);
        
        showToast('Download complete!', 'success');
        
    } catch (error) {
        console.error('Download error:', error);
        showToast('Download failed: ' + error.message, 'error');
    } finally {
        const progress = document.getElementById('downloadProgress');
        if (progress) progress.style.display = 'none';
    }
}

async function createChapterZip(baseUrl, chapterHash, pageFilenames, quality, progressFill, progressText) {
    if (typeof JSZip === 'undefined') {
        showToast('JSZip library not loaded', 'error');
        return;
    }
    
    const zip = new JSZip();
    const safeTitle = (selectedChapter.mangaTitle || 'manga').replace(/[^a-z0-9]/gi, '_').substring(0, 30);
    const folder = zip.folder(`${safeTitle}_Chapter_${selectedChapter.number}`);
    
    let successCount = 0;
    
    for (let i = 0; i < pageFilenames.length; i++) {
        try {
            const response = await fetch(`${baseUrl}/${quality}/${chapterHash}/${pageFilenames[i]}`);
            
            if (!response.ok) continue;
            
            const blob = await response.blob();
            
            if (blob.size === 0) continue;
            
            const ext = pageFilenames[i].split('.').pop() || 'jpg';
            folder.file(`page_${String(i + 1).padStart(3, '0')}.${ext}`, blob);
            
            successCount++;
            
            // Update progress
            const percent = ((i + 1) / pageFilenames.length) * 100;
            if (progressFill) progressFill.style.width = `${percent}%`;
            if (progressText) progressText.textContent = `${Math.round(percent)}%`;
            
        } catch (error) {
            console.error(`Failed page ${i + 1}:`, error);
        }
    }
    
    if (successCount === 0) {
        throw new Error('No pages could be downloaded');
    }
    
    showToast(`Creating ZIP with ${successCount} pages...`, 'info');
    
    const content = await zip.generateAsync({ 
        type: 'blob',
        compression: 'DEFLATE'
    });
    
    // Download ZIP
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${safeTitle}_Chapter_${selectedChapter.number}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    // Save to downloads
    downloadedChapters.push({
        id: Date.now().toString(),
        mangaTitle: selectedChapter.mangaTitle,
        chapterNumber: selectedChapter.number,
        pageCount: successCount,
        downloadedAt: new Date().toISOString()
    });
    
    localStorage.setItem('downloadedChapters', JSON.stringify(downloadedChapters));
}

// ============== UTILITIES ==============

function handleScroll() {
    // Back to top button
    if (backToTop) {
        if (window.scrollY > 300) {
            backToTop.classList.add('show');
        } else {
            backToTop.classList.remove('show');
        }
    }
    
    // Infinite scroll
    if (mainContainer?.style.display !== 'none' && !isLoading && hasMoreResults) {
        const scrollY = window.scrollY;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;
        
        if (scrollY + windowHeight >= documentHeight - 500) {
            if (currentView === 'popular') {
                loadPopularManga();
            } else if (currentView === 'home') {
                loadManga();
            }
        }
    }
}

function showToast(message, type = 'info') {
    if (!toastContainer) return;
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    let icon = 'info-circle';
    if (type === 'success') icon = 'check-circle';
    if (type === 'error') icon = 'exclamation-circle';
    
    toast.innerHTML = `
        <i class="fas fa-${icon}"></i>
        <span>${message}</span>
    `;
    
    toastContainer.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

        to { opacity: 0; transform: translateX(100%); }

`;
